<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ropa para Niñas — PalCus Perú</title>
  <meta name="description" content="Ropa para Niñas con 100% algodón peruano. Suavidad y dulzura en cada prenda" />
  <meta property="og:title" content="Ropa para Niñas — PalCus Perú" />
  <meta property="og:description" content="Ropa para Niñas con 100% algodón peruano." />
  <link rel="icon" href="assets/logo_palcus.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="site-header"></div>
  <main class="section-padding">
    <div style="max-width:80rem;margin:0 auto;">
      <div style="text-align:center;margin-bottom:3rem;">
        <p class="font-heading" style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.4em;color:var(--muted-foreground);margin-bottom:0.5rem;">Colección</p>
        <h1 class="font-heading" style="font-size:clamp(2.25rem,5vw,3rem);font-weight:800;margin:0;">Niñas</h1>
        <p style="color:var(--muted-foreground);margin-top:0.75rem;font-size:0.875rem;">Suavidad y dulzura en cada prenda</p>
      </div>
      <div id="cat-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem;"></div>
    </div>
  </main>
  <div id="site-footer"></div>
  <div id="site-floating"></div>
  <script src="js/products.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/render.js"></script>
  <script src="js/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.PalcusRender.renderGrid('cat-grid', window.PalcusUtil.byCategory('ninas'));
    });
  </script>
</body>
</html>
