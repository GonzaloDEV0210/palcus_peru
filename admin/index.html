<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard PalCus Perú</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        :root { --font-heading: 'Syne', sans-serif; }
        body { font-family: 'Inter', sans-serif; background: #f9f9f9; color: #1a1a1a; }
        .font-heading { font-family: var(--font-heading); }
        .sidebar-link.active { background: #000; color: #fff; }
        .card { background: #fff; border-radius: 16px; border: 1px solid #eee; }
    </style>
</head>
<body class="hidden" id="adminBody">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 p-6 flex flex-col hidden lg:flex">
            <img src="../assets/logo_palcus.png" alt="PalCus" class="h-10 w-auto mb-10">
            <nav class="space-y-2 flex-1">
                <button onclick="switchTab('products', this)" class="sidebar-link active w-full flex align-center gap-3 px-4 py-3 rounded-xl transition-all text-sm font-semibold">
                    <span>📦 Productos</span>
                </button>
                <button onclick="switchTab('categories', this)" class="sidebar-link w-full flex align-center gap-3 px-4 py-3 rounded-xl transition-all text-sm font-semibold text-gray-500 hover:bg-gray-50">
                    <span>🏷️ Categorías</span>
                </button>
            </nav>
            <button id="logoutBtn" class="mt-auto w-full flex align-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-red-500 hover:bg-red-50">
                <span>🚪 Cerrar Sesión</span>
            </button>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 lg:p-10">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
                <div>
                    <h1 class="font-heading text-3xl font-bold uppercase tracking-tight">Gestión de Tienda</h1>
                    <p class="text-gray-500 text-sm">Administra tu inventario y categorías en tiempo real</p>
                </div>
                <button onclick="openModal('productModal')" class="bg-black text-white px-6 py-3 rounded-xl font-bold text-sm uppercase tracking-widest hover:opacity-80 transition-all">
                    + Nuevo Producto
                </button>
            </header>

            <!-- Tab: Products -->
            <section id="tab-products" class="tab-content">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="productsGrid">
                    <!-- Products will be loaded here -->
                    <div class="animate-pulse bg-gray-200 h-64 rounded-2xl"></div>
                    <div class="animate-pulse bg-gray-200 h-64 rounded-2xl"></div>
                    <div class="animate-pulse bg-gray-200 h-64 rounded-2xl"></div>
                </div>
            </section>

            <!-- Tab: Categories -->
            <section id="tab-categories" class="tab-content hidden">
                <div class="card p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-heading text-xl font-bold uppercase">Categorías Disponibles</h2>
                        <button onclick="openModal('categoryModal')" class="text-sm font-bold underline">Añadir Categoría</button>
                    </div>
                    <div id="categoriesList" class="space-y-4">
                        <!-- Categories will be loaded here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal: Product -->
    <div id="productModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-heading text-2xl font-bold uppercase" id="modalTitle">Nuevo Producto</h2>
                <button onclick="closeModal('productModal')" class="text-gray-400 hover:text-black">✕</button>
            </div>
            <form id="productForm" class="space-y-6">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Nombre del Producto</label>
                        <input type="text" id="prodName" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-black outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Precio (S/)</label>
                        <input type="number" step="0.01" id="prodPrice" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-black outline-none transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Categoría</label>
                    <select id="prodCategory" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-black outline-none transition-all">
                        <!-- Loaded from Firebase -->
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Descripción</label>
                    <textarea id="prodDesc" rows="3" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-black outline-none transition-all"></textarea>
                </div>
                
                <div class="border-t pt-6">
                    <p class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-4">Fotos y Variantes</p>
                    <div class="bg-gray-50 p-6 rounded-2xl border border-dashed border-gray-300 text-center">
                        <button type="button" id="uploadWidgetBtn" class="bg-white border border-gray-200 px-6 py-2 rounded-lg text-sm font-semibold shadow-sm hover:bg-gray-50">
                            📷 Subir Fotos a Cloudinary
                        </button>
                        <p class="text-[10px] text-gray-400 mt-2">Puedes subir varias fotos a la vez</p>
                    </div>
                    <div id="uploadedImages" class="flex flex-wrap gap-4 mt-6">
                        <!-- Previews will appear here -->
                    </div>
                </div>

                <div class="flex gap-4 pt-6">
                    <button type="button" onclick="closeModal('productModal')" class="flex-1 px-6 py-4 rounded-xl border border-gray-200 font-bold uppercase tracking-widest text-sm hover:bg-gray-50 transition-all">Cancelar</button>
                    <button type="submit" class="flex-1 bg-black text-white px-6 py-4 rounded-xl font-bold uppercase tracking-widest text-sm hover:opacity-80 transition-all">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Category -->
    <div id="categoryModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md p-8">
            <h2 class="font-heading text-xl font-bold uppercase mb-6">Añadir Categoría</h2>
            <form id="categoryForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Nombre (Ej: Ropa Hombre)</label>
                    <input type="text" id="catName" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Slug (Ej: ropa-hombre)</label>
                    <input type="text" id="catSlug" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none">
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal('categoryModal')" class="flex-1 px-4 py-3 rounded-xl border border-gray-200 font-bold uppercase text-xs">Cancelar</button>
                    <button type="submit" class="flex-1 bg-black text-white px-4 py-3 rounded-xl font-bold uppercase text-xs">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
