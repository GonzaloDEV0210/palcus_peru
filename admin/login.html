<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo - PalCus Perú</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --font-heading: 'Syne', sans-serif; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .font-heading { font-family: var(--font-heading); }
        input { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        input:focus { border-color: #fff !important; ring: 0 !important; }
    </style>
</head>
<body>
    <div class="glass p-8 w-full max-w-md mx-4 animate-in fade-in zoom-in duration-700">
        <div class="text-center mb-8">
            <img src="https://res.cloudinary.com/dv7nmkmpm/image/upload/palcus_assets/logo_palcus.png" alt="PalCus" class="h-12 mx-auto mb-4 invert">
            <h1 class="font-heading text-2xl font-bold uppercase tracking-widest">Panel de Control</h1>
            <p class="text-gray-500 text-sm mt-2">Ingresa tus credenciales para gestionar la tienda</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-400 font-semibold mb-2">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl focus:outline-none transition-all" placeholder="admin@palcus.pe">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-400 font-semibold mb-2">Contraseña</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl focus:outline-none transition-all" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-gray-200 transition-all uppercase tracking-widest text-sm">
                Iniciar Sesión
            </button>
        </form>
        <p id="errorMsg" class="text-red-500 text-xs mt-4 text-center hidden"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBsfug7JA6sNZKILUoRwJ8LL3L2BflAs0A",
          authDomain: "palcus-peru.firebaseapp.com",
          projectId: "palcus-peru",
          storageBucket: "palcus-peru.firebasestorage.app",
          messagingSenderId: "387253312347",
          appId: "1:387253312347:web:571d1195bad61f3e48187e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'index.html';
            } catch (error) {
                errorMsg.innerText = "Error: Credenciales inválidas o acceso denegado.";
                errorMsg.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
